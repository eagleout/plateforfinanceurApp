<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page introuvable — Plateforme Financement</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Manrope',sans-serif;background:#0B1220;color:#E8EBF2;
  min-height:100vh;display:grid;place-items:center;
  background-image:
    radial-gradient(800px 500px at 50% 30%, rgba(201,163,91,.15), transparent 60%),
    radial-gradient(600px 400px at 50% 100%, rgba(63,181,138,.06), transparent 60%);
  padding:40px;text-align:center;
}
.code{
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:clamp(120px,18vw,220px);line-height:1;letter-spacing:-.04em;
  background:linear-gradient(180deg,#E8CD93,#C9A35B 80%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  margin-bottom:10px;
}
h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(28px,3vw,40px);letter-spacing:-.025em;color:#fff;margin-bottom:14px}
p{color:#B5BDD0;font-size:17px;margin-bottom:30px;max-width:480px}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:14px 26px;border-radius:10px;
  background:linear-gradient(180deg,#E8CD93,#C9A35B);
  color:#0B1220;font-weight:600;text-decoration:none;
  box-shadow:0 10px 30px -10px rgba(201,163,91,.55);
  transition:transform .2s;
}
.btn:hover{transform:translateY(-1px)}
</style>
</head>
<body>
  <div>
    <div class="code">404</div>
    <h1>Cette page n'existe pas.</h1>
    <p>Le lien que vous avez suivi semble obsolète ou vous n'avez pas accès à cette ressource. Retournez à votre espace de suivi.</p>
    <a href="/" class="btn">Retour à mon espace
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </a>
  </div>
</body>
</html>
